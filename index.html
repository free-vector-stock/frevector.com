<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vectors, SVGs, Icons and Clipart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-banner">
        <a href="/">
            <img src="https://frevector.com/logo-white.png" alt="Frevector Logo" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-center">
            <div class="search-container">
                <button class="search-icon-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search for free vectors, icons...">
            </div>
        </div>

        <button id="themeToggle" class="theme-btn" title="Toggle Dark Mode">
            <span id="themeIcon">🌙</span>
        </button>

        <select id="sortFilter" class="sort-filter">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
        </select>
    </header>

    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">CATEGORIES</div>
            <nav class="categories-list" id="categoriesList">
                </nav>
        </aside>

        <main class="content">
            <h1 class="category-title" id="categoryTitle">Free Vectors, SVGs, Icons and Clipart</h1>
            <div class="vectors-grid" id="vectorsGrid">
                </div>
        </main>
    </div>

    <div class="bottom-fixed-container">
        <section class="our-picks-section">
            <div class="our-picks-header">
                <span class="our-picks-label">OUR PICKS</span>
                <div class="our-picks-nav">
                    <button class="our-picks-arrow" id="ourPicksPrev">←</button>
                    <button class="our-picks-arrow" id="ourPicksNext">→</button>
                </div>
            </div>
            <div class="our-picks-track-wrap">
                <div class="our-picks-track" id="ourPicksTrack">
                    </div>
            </div>
        </section>

        <div class="pagination-wrapper">
            <div class="pagination-nav">
                <button class="pag-btn" id="prevBtn">PREV</button>
                <span class="page-num" id="pageNumber">1</span>
                <span class="page-total" id="pageTotal">/ 1</span>
                <button class="pag-btn" id="nextBtn">NEXT</button>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-left">
                © 2026 Frevector. All rights reserved.
            </div>
            <div class="footer-nav">
                <a href="#" class="footer-link modal-trigger" data-modal="about">About</a>
                <a href="#" class="footer-link modal-trigger" data-modal="contact">Contact</a>
                <a href="#" class="footer-link modal-trigger" data-modal="terms">Terms</a>
                <a href="#" class="footer-link modal-trigger" data-modal="privacy">Privacy</a>
            </div>
        </footer>
    </div>

    <div id="downloadPage" class="download-page" style="display: none;">
        <div class="download-page-header">
            <span class="dp-site">FREVECTOR</span>
            <button class="dp-close" id="dpClose">×</button>
        </div>
        <div class="download-page-body">
            <div class="dp-left">
                <img id="dpImage" src="" alt="Download preview" class="dp-image">
            </div>
            <div class="dp-right">
                <h1 id="dpTitle" style="margin-bottom: 20px;">Vector Title</h1>
                <p style="margin-bottom: 10px;"><strong>Format:</strong> <span id="dpFileFormat">EPS, SVG, JPEG</span></p>
                <p style="margin-bottom: 30px; color: #666;">Your download will start automatically. Please wait a few seconds.</p>
                
                <button id="dpDownloadBtn" class="download-btn">DOWNLOAD NOW</button>
                
                <div id="dpCountdownBox" style="display: none; text-align: center;">
                    <div style="font-size: 48px; font-weight: 800; margin-bottom: 10px;" id="dpCountdown">3</div>
                    <p>Preparing your file...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="infoModal" class="info-modal" style="display: none;">
        <div class="info-modal-box">
            <button class="info-modal-close" id="infoModalClose">×</button>
            <div id="infoModalBody"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
