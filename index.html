<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vector, SVG & EPS Downloads</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* TÜM SORUNLARI ÇÖZEN ÖZEL CSS */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
        }

        /* Ana içerik alanının altına, footer'ın üzerine binmemesi için boşluk ekliyoruz */
        .main-container {
            padding-bottom: 120px; /* Sayfalama + Footer toplam yüksekliği kadar */
            display: flex;
            height: calc(100vh - 120px); /* Ekran yüksekliğine göre sidebar'ı ayarlar */
            align-items: stretch;
        }

        /* SIDEBAR VE KATEGORİ LİSTESİ DÜZENLEMESİ */
        .sidebar {
            width: 250px; /* Veya mevcut genişliğiniz */
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eee;
            background-color: #fff;
            padding: 20px 0 0 0;
        }

        .sidebar-title {
            padding: 0 20px 10px 20px;
            font-weight: bold;
            font-size: 14px;
            color: #000;
        }

        .categories-list {
            flex: 1; /* Sidebar içindeki tüm boşluğu kaplar */
            overflow-y: auto; /* İçerik taşarsa kaydırma çubuğu çıkar */
            padding: 0 10px 20px 20px;
        }

        /* Kaydırma çubuğu tasarımı (isteğe bağlı, daha zarif görünüm için) */
        .categories-list::-webkit-scrollbar {
            width: 5px;
        }
        .categories-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .categories-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
        .categories-list::-webkit-scrollbar-thumb:hover {
            background: #888;
        }

        /* ALT SABİT ALAN (PAGINATION + FOOTER) */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 999;
            background-color: #fff;
        }

        .pagination-wrapper {
            padding: 8px 0;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .pagination-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .pag-btn {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background-color: #000;
            height: 60px;
        }

        .copyright, .footer-link {
            color: #888;
            text-decoration: none;
            font-size: 11px;
        }

        .footer-nav {
            display: flex;
            gap: 15px;
        }

        .footer-link:hover { color: #fff; }

        .top-banner {
            height: 60px;
            background-color: #000;
            display: flex;
            align-items: center;
        }

        /* MODAL YAPISI */
        .info-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .info-modal-box {
            background-color: #fff;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            padding: 40px;
            position: relative;
            border-radius: 8px;
            overflow-y: auto;
        }

        .info-modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="top-banner">
        <a href="/" class="banner-logo-link">
            <img src="logo.svg" alt="Frevector" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-center">
            <div class="search-container">
                <button class="search-icon-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="8" r="6" stroke="#000" stroke-width="2"/><path d="M12.5 12.5L18 18" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search vectors...">
            </div>
        </div>
        <div class="header-right">
            <select id="sortFilter" class="sort-filter">
                <option value="">Upload date: Any time</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-title">CATEGORIES</div>
            <nav class="categories-list" id="categoriesList"></nav>
        </aside>

        <main class="content">
            <h1 id="categoryTitle" class="category-title">Vector</h1>
            <div id="vectorsGrid" class="vectors-grid"></div>
        </main>
    </div>

    <div class="fixed-bottom-bar">
        <div class="pagination-wrapper">
            <div class="pagination-nav">
                <button id="prevBtn" class="pag-btn">&#8249; Previous</button>
                <span id="pageNumber" style="font-size: 13px; font-weight: bold; color: #333;">1</span>
                <button id="nextBtn" class="pag-btn">Next &#8250;</button>
                <span id="pageTotal" style="font-size: 13px; color: #666;">/ 1</span>
            </div>
        </div>

        <footer class="footer">
            <span class="copyright">2026 &copy; frevector.com</span>
            <nav class="footer-nav">
                <a href="#" class="footer-link modal-trigger" data-modal="about">About Us</a>
                <a href="#" class="footer-link modal-trigger" data-modal="privacy">Privacy Policy</a>
                <a href="#" class="footer-link modal-trigger" data-modal="terms">Terms of Service</a>
                <a href="#" class="footer-link modal-trigger" data-modal="contact">Contact</a>
            </nav>
        </footer>
    </div>

    <div id="downloadPage" class="download-page" style="display:none;">
        <div class="download-page-header">
            <span class="dp-site">frevector.com</span>
            <button id="dpClose" class="dp-close">&#10005;</button>
        </div>
        <div class="download-page-body">
            <div class="dp-left"><img id="dpImage" src="" alt="" class="dp-image"></div>
            <div class="dp-right">
                <h2 id="dpTitle" class="dp-title"></h2>
                <p id="dpDescription" class="dp-desc"></p>
                <button id="dpDownloadBtn" class="download-btn">DOWNLOAD</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="info-modal" style="display:none;">
        <div class="info-modal-box">
            <button class="info-modal-close" id="infoModalClose">&#10005;</button>
            <div id="infoModalBody" class="info-modal-body"></div>
        </div>
    </div>

    <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner"></div></div>
    <script src="main.js?v=2026031407"></script>
</body>
</html>
