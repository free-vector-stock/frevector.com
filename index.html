<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vector, SVG & EPS Downloads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-banner">
        <a href="/" class="banner-logo-link">
            <img src="logo.svg" alt="Frevector" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-center">
            <div class="search-container">
                <button class="search-icon-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="8" r="6" stroke="#000" stroke-width="2%"/><path d="M12.5 12.5L18 18" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search thousands of free vectors, SVGs and icons (e.g. 'pizza', 'abstract background')...">
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="filter-group">
                <h3 class="filter-title">TYPE</h3>
                <button class="type-filter active" data-type="all">All</button>
                <button class="type-filter" data-type="vector">Vector</button>
                <button class="type-filter" data-type="jpeg">Jpeg</button>
            </div>
            <div class="filter-group">
                <h3 class="filter-title">CATEGORIES</h3>
                <button class="cat-link active" data-cat="all">All</button>
                <button class="cat-link" data-cat="Abstract">Abstract</button>
                <button class="cat-link" data-cat="Animals">Animals</button>
                <button class="cat-link" data-cat="The Arts">The Arts</button>
                <button class="cat-link" data-cat="Backgrounds">Backgrounds</button>
                <button class="cat-link" data-cat="Fashion">Fashion</button>
                <button class="cat-link" data-cat="Buildings">Buildings</button>
                <button class="cat-link" data-cat="Business">Business</button>
                <button class="cat-link" data-cat="Celebrities">Celebrities</button>
                <button class="cat-link" data-cat="Education">Education</button>
                <button class="cat-link" data-cat="Food">Food</button>
                <button class="cat-link" data-cat="Drink">Drink</button>
                <button class="cat-link" data-cat="Medical">Medical</button>
                <button class="cat-link" data-cat="Holidays">Holidays</button>
                <button class="cat-link" data-cat="Industrial">Industrial</button>
                <button class="cat-link" data-cat="Interiors">Interiors</button>
                <button class="cat-link" data-cat="Miscellaneous">Miscellaneous</button>
                <button class="cat-link" data-cat="Nature">Nature</button>
                <button class="cat-link" data-cat="Objects">Objects</button>
                <button class="cat-link" data-cat="Outdoor">Outdoor</button>
                <button class="cat-link" data-cat="People">People</button>
                <button class="cat-link" data-cat="Religion">Religion</button>
                <button class="cat-link" data-cat="Science">Science</button>
                <button class="cat-link" data-cat="Symbols">Symbols</button>
                <button class="cat-link" data-cat="Sports">Sports</button>
                <button class="cat-link" data-cat="Technology">Technology</button>
                <button class="cat-link" data-cat="Transportation">Transportation</button>
                <button class="cat-link" data-cat="Vintage">Vintage</button>
                <button class="cat-link" data-cat="Logo">Logo</button>
                <button class="cat-link" data-cat="Font">Font</button>
                <button class="cat-link" data-cat="Icon">Icon</button>
            </div>
        </aside>

        <main class="content">
            <div id="h1Container" class="h1-wrapper">
                <h1 id="pageH1">Free Vector, SVGs, Icons and Clipart</h1>
            </div>

            <div class="pagination-wrapper-top">
                <div class="pagination">
                    <button id="prevPage" class="pag-btn">Prev</button>
                    <span id="pageInfo"><span id="pageNumber">1</span> <span id="pageTotal">/ 1</span></span>
                    <button id="nextPage" class="pag-btn">Next</button>
                </div>
            </div>

            <section class="our-picks-section">
                <h2 class="our-picks-label">Our selections for you</h2>
                <div class="our-picks-content-wrapper">
                    <button id="pickPrev" class="our-picks-arrow">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <div class="our-picks-track-wrap">
                        <div id="ourPicksTrack" class="our-picks-track"></div>
                    </div>
                    <button id="pickNext" class="our-picks-arrow">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                </div>
            </section>

            <div id="vectorGrid" class="vector-grid"></div>
        </main>
    </div>

    <div id="downloadModal" class="modal-overlay" style="display:none;">
        <div class="modal-content-full">
            <div class="dl-page-header">
                <button id="closeDLPage" class="dl-back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to Gallery
                </button>
            </div>
            <div class="dl-page-content">
                <div class="dl-page-preview">
                    <img id="dlPreviewImg" src="" alt="Preview">
                </div>
                <div class="dl-page-details">
                    <h2 id="dlPageTitle"></h2>
                    <div id="dlKeywords" class="dp-kw"></div>
                    <div class="dl-meta-info">
                        <p><strong>License:</strong> Free for Personal & Commercial Use</p>
                        <p><strong>Format:</strong> <span id="dlPageFormat"></span></p>
                    </div>
                    <div class="dl-action-area">
                        <button id="finalDownloadBtn" class="final-download-btn">DOWNLOAD</button>
                        <div id="dlTimerBox" class="dl-timer-box" style="display:none;">
                            <p>Your download starts in</p>
                            <div id="countdownNum" class="countdown-num">4</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay" style="display:none;">
        <div class="info-modal-content">
            <button id="infoModalClose" class="info-close-btn">&times;</button>
            <div id="infoModalBody" class="info-body-text"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-left">2026 © frevector.com</div>
        <div class="footer-right">
            <a href="javascript:void(0)" class="modal-trigger" data-modal="about">About Us</a>
            <a href="javascript:void(0)" class="modal-trigger" data-modal="privacy">Privacy Policy</a>
            <a href="javascript:void(0)" class="modal-trigger" data-modal="terms">Terms of Service</a>
            <a href="javascript:void(0)" class="modal-trigger" data-modal="contact">Contact</a>
        </div>
    </footer>

    <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner"></div></div>
    <script src="main.js"></script>
</body>
</html>
