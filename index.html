<style>
    /* --- 1. KATEGORİLER İÇİN ÖZEL KAYDIRMA ÇUBUĞU VE STİL --- */
    .sidebar {
        width: 200px;
        background-color: #fff;
        border-right: 1px solid #eee;
        padding: 15px 5px; /* Yan boşlukları biraz daralttık */
        display: flex;
        flex-direction: column;
        height: 100%;
        flex-shrink: 0;
        /* Kaydırma çubuğu ayarları */
        overflow-y: auto; 
        scrollbar-width: thin; /* Firefox için ince çubuk */
        scrollbar-color: #ccc transparent; /* Firefox için renk */
    }

    /* Chrome, Safari ve Edge için kaydırma çubuğu tasarımı */
    .sidebar::-webkit-scrollbar {
        width: 4px; /* Çok ince ve zarif bir çubuk */
    }
    .sidebar::-webkit-scrollbar-track {
        background: transparent;
    }
    .sidebar::-webkit-scrollbar-thumb {
        background-color: #ccc;
        border-radius: 10px;
    }
    .sidebar::-webkit-scrollbar-thumb:hover {
        background-color: #999;
    }

    /* --- 2. SEÇİLİ KATEGORİ: SİYAH ARKA PLAN ÜZERİNE BEYAZ YAZI --- */
    /* Bu sınıfı JavaScript ile aktif kategoriye ekleteceğiz */
    .categories-list a.active {
        background-color: #000 !important;
        color: #fff !important;
        font-weight: bold;
        border-radius: 4px;
        padding: 4px 8px;
        margin: 2px 0;
    }

    .categories-list a {
        display: block;
        padding: 3px 8px;
        font-size: 13px;
        color: #333;
        text-decoration: none;
        transition: all 0.2s ease;
    }

    /* --- 3. FOOTER YAZILARINI BÜYÜTME --- */
    .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        background-color: #000;
        height: 60px;
    }

    .copyright {
        color: #ccc;
        font-size: 14px; /* 12px'den 14px'e çıkarıldı */
        font-weight: 500;
    }

    .footer-link {
        color: #ccc;
        text-decoration: none;
        font-size: 14px; /* 12px'den 14px'e çıkarıldı */
        margin-left: 20px;
        transition: color 0.2s;
    }

    .footer-link:hover {
        color: #fff;
    }
</style>

<script>
    // Kategorilere tıklandığında "active" sınıfını yönetmek için 
    // main.js içindeki kategori oluşturma fonksiyonuna şu mantığı eklemelisiniz:
    
    function updateActiveCategory(selectedElement) {
        // Önce tüm aktif sınıflarını temizle
        document.querySelectorAll('.categories-list a').forEach(el => {
            el.classList.remove('active');
        });
        // Tıklanan öğeye aktif sınıfını ekle
        selectedElement.classList.add('active');
    }
</script>
