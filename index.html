<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vector, SVG & EPS Downloads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-banner">
        <a href="/" class="banner-logo-link">
            <img src="logo.svg" alt="Frevector" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-center">
            <div class="search-container">
                <button class="search-icon-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="8" r="6" stroke="#000" stroke-width="2"/><path d="M12.5 12.5L18 18" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search keywords (e.g. pizza, animal)...">
            </div>
        </div>
        <div class="header-right">
            <select id="sortFilter" class="sort-filter">
                <option value="">Upload date: Any time</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar" id="sidebarMenu">
            <div class="sidebar-title">TYPE</div>
            <nav class="type-list">
                <a href="#" class="category-item type-filter active" data-type="all">All</a>
                <a href="#" class="category-item type-filter" data-type="vector">Vector</a>
                <a href="#" class="category-item type-filter" data-type="jpeg">JPEG</a>
            </nav>
            <div class="sidebar-title" style="margin-top: 15px;">CATEGORIES</div>
            <nav class="categories-list" id="categoriesList">
                </nav>
        </aside>

        <main class="content">
            <h1 id="categoryTitle" class="category-title-h1">Free Vectors, SVGs, Icons and Clipart</h1>
            <div id="vectorsGrid" class="vectors-grid"></div>
        </main>
    </div>

    <div class="bottom-fixed-container">
        <div class="pagination-wrapper-centered">
            <div class="pagination-nav">
                <button id="prevBtn" class="pag-btn">&#8249; Previous</button>
                <span id="pageNumber" class="page-num">1</span>
                <button id="nextBtn" class="pag-btn">Next &#8250;</button>
                <span class="page-total" id="pageTotal">/ 1</span>
            </div>
        </div>

        <section class="our-picks-section" id="ourPicksSection">
            <div class="our-picks-label">Our selections for you</div>
            <div class="our-picks-content-wrapper">
                <button class="our-picks-arrow" id="ourPicksPrev">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="our-picks-track-wrap">
                    <div class="our-picks-track" id="ourPicksTrack"></div>
                </div>
                <button class="our-picks-arrow" id="ourPicksNext">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </section>

        <footer class="footer">
            <span class="copyright">2026 &copy; frevector.com</span>
            <nav class="footer-nav">
                <a href="javascript:void(0)" class="footer-link modal-trigger" data-modal="about">About Us</a>
                <a href="javascript:void(0)" class="footer-link modal-trigger" data-modal="privacy">Privacy Policy</a>
                <a href="javascript:void(0)" class="footer-link modal-trigger" data-modal="terms">Terms of Service</a>
                <a href="javascript:void(0)" class="footer-link modal-trigger" data-modal="contact">Contact</a>
            </nav>
        </footer>
    </div>

    <div id="infoModal" class="info-modal" style="display:none;">
        <div class="info-modal-box">
            <button class="info-modal-close" id="infoModalClose">&#10005;</button>
            <div id="infoModalBody" class="info-modal-body"></div>
        </div>
    </div>

    <div id="downloadPageOverlay" class="download-page-overlay" style="display:none;">
        <div class="dl-page-container">
            <div class="dl-page-header">
                <button id="closeDLPage" class="dl-back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to Gallery
                </button>
            </div>
            <div class="dl-page-content">
                <div class="dl-page-preview">
                    <img id="dlPreviewImg" src="" alt="Preview">
                </div>
                <div class="dl-page-details">
                    <h2 id="dlPageTitle"></h2>
                    <div id="dlKeywords" class="dp-kw"></div>
                    <div class="dl-meta-info">
                        <p><strong>License:</strong> Free for Personal & Commercial Use</p>
                        <p><strong>Format:</strong> <span id="dlPageFormat"></span></p>
                    </div>
                    <div class="dl-action-area">
                        <button id="finalDownloadBtn" class="final-download-btn">DOWNLOAD</button>
                        <div id="dlTimerBox" class="dl-timer-box" style="display:none;">
                            <p>Your download starts in</p>
                            <div id="countdownNum" class="countdown-num">4</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner"></div></div>
    <script src="main.js"></script>
</body>
</html>
