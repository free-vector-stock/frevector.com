<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vector, SVG & EPS Downloads</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-banner">
        <a href="/" class="banner-logo-link">
            <img src="logo.svg" alt="Frevector" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-center">
            <div class="search-container">
                <button class="search-icon-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="8" r="6" stroke="#000" stroke-width="2"/><path d="M12.5 12.5L18 18" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search vectors...">
            </div>
        </div>
        <div class="header-right">
            <select id="sortFilter" class="sort-filter">
                <option value="">Upload date: Any time</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
                <option value="alphabetical">A-Z</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="category-title">Categories</div>
            <ul class="category-list" id="categoryList">
                </ul>
        </aside>

        <main class="content">
            <div class="vector-grid" id="vectorGrid"></div>
            <div class="pagination">
                <button id="prevBtn" class="page-btn">Previous</button>
                <div class="page-info"><span id="pageNumber">1</span> <span id="pageTotal">/ 1</span></div>
                <button id="nextBtn" class="page-btn">Next</button>
            </div>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a data-modal="about">About Us</a>
            <a data-modal="privacy">Privacy Policy</a>
            <a data-modal="terms">Terms of Service</a>
            <a data-modal="contact">Contact</a>
        </div>
        <p>&copy; 2026 Frevector. All rights reserved.</p>
    </footer>

    <div id="downloadPage" class="download-page">
        <div class="dp-header">
            <button id="dpClose" class="dp-close-btn">BACK TO EXPLORE</button>
        </div>
        <div class="dp-content">
            <div class="dp-left">
                <img id="dpImage" src="" alt="" class="dp-image">
            </div>
            <div class="dp-right">
                <h2 id="dpTitle" class="dp-title"></h2>
                <div id="dpKeywords" class="detail-keywords"></div>
                <table style="width:100%; border-collapse: collapse; margin: 20px 0;">
                    <tr><td style="padding:10px 0; border-bottom:1px solid #eee; color:#888;">FORMAT</td><td id="dpFormat" style="text-align:right; font-weight:600;">EPS / JPG</td></tr>
                    <tr><td style="padding:10px 0; border-bottom:1px solid #eee; color:#888;">CATEGORY</td><td id="dpCategory" style="text-align:right; font-weight:600;">-</td></tr>
                </table>
                <button id="dpDownloadBtn" class="download-btn">DOWNLOAD NOW</button>
                <div id="dpCountdownBox" style="display:none; text-align:center; padding:20px; background:#f9f9f9; margin-top:10px;">
                    <p>Your download will start in</p>
                    <div id="dpCountdown" style="font-size:40px; font-weight:800; color:#000;">4</div>
                </div>
            </div>
        </div>
    </div>

    <div id="infoModal" class="info-modal">
        <div class="info-modal-box">
            <button class="info-modal-close" id="infoModalClose">&#10005;</button>
            <div id="infoModalBody" class="info-modal-body"></div>
        </div>
    </div>

    <div id="loader" class="loader-overlay"><div class="spinner"></div></div>

    <script src="main.js"></script>
</body>
</html>
