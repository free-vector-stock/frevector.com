<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vector, SVG & EPS Downloads</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-banner">
        <a href="/" class="banner-logo-link">
            <img src="logo.svg" alt="Frevector" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-center">
            <div class="search-container">
                <button class="search-icon-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="8" r="6" stroke="#000" stroke-width="2"/><path d="M12.5 12.5L18 18" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search keywords (e.g. pizza, animal)...">
            </div>
        </div>
        <div class="header-right">
            <select id="sortFilter" class="sort-filter">
                <option value="">Upload date: Any time</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
            </select>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="type-filters">
                <a href="#" class="type-filter active" data-type="all">All</a>
                <a href="#" class="type-filter" data-type="vector">Vector</a>
                <a href="#" class="type-filter" data-type="jpeg">JPEG</a>
            </div>
            <nav class="categories-list" id="categoriesList"></nav>
        </aside>

        <main class="content">
            <h1 id="categoryTitle" class="main-h1">Free Vectors, SVGs, Icons and Clipart</h1>
            
            <div id="vectorsGrid" class="vectors-grid"></div>

            <div class="pagination-wrapper">
                <div class="pagination">
                    <button id="prevBtn" class="page-btn">Prev</button>
                    <span class="page-info"><span id="pageNumber">1</span> <span id="pageTotal">/ 1</span></span>
                    <button id="nextBtn" class="page-btn">Next</button>
                </div>
            </div>

            <section class="our-picks-section">
                <div class="picks-header">
                    <h2 class="picks-title">Our selections for you</h2>
                    <div class="picks-nav">
                        <button id="ourPicksPrev" class="picks-nav-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/></svg>
                        </button>
                        <button id="ourPicksNext" class="picks-nav-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z" fill="currentColor"/></svg>
                        </button>
                    </div>
                </div>
                <div class="picks-container">
                    <div id="ourPicksTrack" class="picks-track"></div>
                </div>
            </section>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <span class="copyright">2026 © frevector.com</span>
            <nav class="footer-links">
                <a href="#" class="modal-trigger" data-modal="about">About Us</a>
                <a href="#" class="modal-trigger" data-modal="privacy">Privacy Policy</a>
                <a href="#" class="modal-trigger" data-modal="terms">Terms of Service</a>
                <a href="#" class="modal-trigger" data-modal="contact">Contact</a>
            </nav>
        </div>
    </footer>

    <div id="downloadPageOverlay" class="download-overlay" style="display:none;">
        <div class="dl-page-content">
            <button id="closeDLPage" class="dl-close-btn">&times;</button>
            <div class="dl-layout">
                <div class="dl-preview">
                    <img id="dlPreviewImg" src="" alt="Preview">
                </div>
                <div class="dl-details">
                    <h2 id="dlPageTitle"></h2>
                    <table class="dl-table">
                        <tr><td>Format:</td><td id="dlPageFormat"></td></tr>
                        <tr><td>License:</td><td>Free for Personal & Commercial Use</td></tr>
                    </table>
                    <button id="finalDownloadBtn" class="download-btn-large">DOWNLOAD NOW</button>
                    <div id="dlTimerBox" style="display:none;">
                        <p>Your download starts in...</p>
                        <div id="countdownNum" class="countdown-big">4</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="infoModal" class="info-modal" style="display:none;">
        <div class="info-modal-box">
            <button class="info-modal-close" id="infoModalClose">&times;</button>
            <div id="infoModalBody" class="info-modal-body"></div>
        </div>
    </div>

    <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner"></div></div>

    <script src="main.js"></script>
</body>
</html>
