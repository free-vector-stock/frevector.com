<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vector, SVG & EPS Downloads</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* TEMEL YAPI DÜZENLEME */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column; /* Sayfayı dikeyde 3 bölüme ayırır: Header, Ana İçerik, Footer */
        }

        /* Üst Siyah Logo Bandı */
        .top-banner {
            height: 60px;
            background-color: #000;
            display: flex;
            align-items: center;
            padding: 0 30px;
            flex-shrink: 0;
        }

        .banner-logo { height: 30px; }

        /* Arama ve Filtre Bandı */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }

        /* ANA İÇERİK ALANI (Sidebar + Content) */
        .main-container {
            display: flex;
            flex: 1 0 auto; /* Sayfanın geri kalan tüm boşluğunu doldurur */
            align-items: stretch; /* Sidebar'ın aşağı kadar uzanmasını sağlar */
        }

        /* SOL SIDEBAR (Kategoriler) */
        .sidebar {
            width: 200px;
            border-right: 1px solid #eee;
            padding: 20px 0;
            flex-shrink: 0;
            background-color: #fff;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: bold;
            color: #888;
            padding: 0 20px 10px 20px;
        }

        .categories-list {
            display: flex;
            flex-direction: column;
            gap: 2px; /* Kategoriler arası boşluğu daralttım */
        }

        .categories-list a, .categories-list button {
            padding: 6px 20px;
            font-size: 13px;
            text-decoration: none;
            color: #333;
            display: block;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
        }

        .categories-list a:hover { background-color: #f5f5f5; }
        .categories-list .active { font-weight: bold; background-color: #000; color: #fff; }

        /* SAĞ İÇERİK ALANI */
        .content {
            flex: 1;
            padding: 20px 30px 140px 30px; /* Alttaki sayfalama için geniş boşluk */
        }

        .category-title { font-size: 24px; margin-bottom: 20px; }

        /* SAYFALAMA VE FOOTER ALANI (Sticky Footer) */
        .bottom-section {
            width: 100%;
            margin-top: auto; /* İçerik az olsa bile en alta iter */
            flex-shrink: 0;
        }

        .pagination-wrapper {
            padding: 15px 0;
            background: #fff;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .pagination-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .pag-btn {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 6px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
        }

        /* SİYAH FOOTER */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background-color: #000;
            height: 60px;
        }

        .copyright, .footer-link { color: #888; text-decoration: none; font-size: 11px; }
        .footer-nav { display: flex; gap: 20px; }
        .footer-link:hover { color: #fff; }

        /* Grid Sistemi */
        .vectors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>

    <div class="top-banner">
        <a href="/" class="banner-logo-link">
            <img src="logo.svg" alt="Frevector" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search vectors...">
            </div>
        </div>
        <div class="header-right">
            <select id="sortFilter">
                <option value="">Upload date: Any time</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-title">CATEGORIES</div>
            <nav class="categories-list" id="categoriesList">
                <a href="#" class="active">All</a>
                <a href="#">Vector</a>
                <a href="#">JPEG</a>
                <div style="height: 10px;"></div>
                <div class="sidebar-title">All Categories</div>
                <a href="#">Abstract</a>
                <a href="#">Animals</a>
                <a href="#">The Arts</a>
                <a href="#">Backgrounds</a>
                <a href="#">Fashion</a>
                <a href="#">Buildings</a>
                <a href="#">Business</a>
                <a href="#">Celebrities</a>
                </nav>
        </aside>

        <main class="content">
            <h1 id="categoryTitle" class="category-title">Vector</h1>
            <div id="vectorsGrid" class="vectors-grid">
                </div>
        </main>
    </div>

    <div class="bottom-section">
        <div class="pagination-wrapper">
            <div class="pagination-nav">
                <button id="prevBtn" class="pag-btn">&#8249; Previous</button>
                <span id="pageNumber" style="font-weight: bold;">1</span>
                <button id="nextBtn" class="pag-btn">Next &#8250;</button>
                <span id="pageTotal" style="color: #666;">/ 93</span>
            </div>
        </div>

        <footer class="footer">
            <span class="copyright">2026 &copy; frevector.com</span>
            <nav class="footer-nav">
                <a href="#" class="footer-link">About Us</a>
                <a href="#" class="footer-link">Privacy Policy</a>
                <a href="#" class="footer-link">Terms of Service</a>
                <a href="#" class="footer-link">Contact</a>
            </nav>
        </footer>
    </div>

    <script src="main.js?v=2026031407"></script>
</body>
</html>
