<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frevector - Free Vector, SVG & EPS Downloads</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dp-countdown-box { text-align:center; margin-top:20px; }
    .dp-countdown-num { font-size:48px; font-weight:bold; margin:10px 0; }

    .our-picks-wrapper {
      display:flex; align-items:center; justify-content:center;
    }
    .our-picks-arrow {
      background:#000; color:#fff; border:none;
      font-size:28px; padding:10px 14px;
      cursor:pointer; transition:background 0.3s; z-index:10;
    }
    .our-picks-arrow:hover { background:#444; }
    .our-picks-track-wrap { flex:1; overflow:hidden; }
    .our-picks-track { display:flex; transition:transform 0.3s ease; }
  </style>
</head>
<body>
  <div class="top-banner">
    <a href="/" class="banner-logo-link"><img src="logo.svg" alt="Frevector" class="banner-logo"></a>
  </div>

  <header class="header">
    <div class="header-center">
      <div class="search-container">
        <button class="search-icon-btn" id="searchBtn">🔍</button>
        <input type="text" id="searchInput" class="search-input" placeholder="Search vectors...">
      </div>
    </div>
    <div class="header-right">
      <select id="sortFilter" class="sort-filter">
        <option value="">Upload date: Any time</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
      </select>
    </div>
  </header>

  <div class="main-container">
    <aside class="sidebar">
      <div class="sidebar-title">CATEGORIES</div>
      <nav class="categories-list" id="categoriesList"></nav>
    </aside>

    <main class="content">
      <h1 id="categoryTitle" class="category-title">Vector</h1>
      <div id="vectorsGrid" class="vectors-grid"></div>
    </main>
  </div>

  <div class="bottom-fixed-container">
    <section class="our-picks-section" id="ourPicksSection">
      <div class="our-picks-header">
        <div class="our-picks-label">Our selections for you</div>
      </div>
      <div class="our-picks-wrapper">
        <button class="our-picks-arrow" id="ourPicksPrev" title="Previous">&#8249;</button>
        <div class="our-picks-track-wrap">
          <div class="our-picks-track" id="ourPicksTrack"></div>
        </div>
        <button class="our-picks-arrow" id="ourPicksNext" title="Next">&#8250;</button>
      </div>
    </section>

    <div class="pagination-wrapper">
      <div class="pagination-nav">
        <button id="prevBtn" class="pag-btn">&#8249; Previous</button>
        <span id="pageNumber" class="page-num">1</span>
        <button id="nextBtn" class="pag-btn">Next &#8250;</button>
        <span class="page-total" id="pageTotal">/ 1</span>
      </div>
    </div>

    <footer class="footer">
      <span class="copyright">2026 &copy; frevector.com</span>
      <nav class="footer-nav">
        <a href="#" class="footer-link modal-trigger" data-modal="about">About Us</a>
        <a href="#" class="footer-link modal-trigger" data-modal="privacy">Privacy Policy</a>
        <a href="#" class="footer-link modal-trigger" data-modal="terms">Terms of Service</a>
        <a href="#" class="footer-link modal-trigger" data-modal="contact">Contact</a>
      </nav>
    </footer>
  </div>

  <div id="downloadPage" class="download-page" style="display:none;">
    <div class="download-page-header">
      <span class="dp-site">frevector.com</span>
      <button id="dpClose" class="dp-close">&#10005;</button>
    </div>
    <div class="download-page-body">
      <div class="dp-left"><img id="dpImage" src="" alt="" class="dp-image"></div>
      <div class="dp-right">
        <h2 id="dpTitle" class="dp-title"></h2>
        <p id="dpDescription" class="dp-desc"></p>
        <div id="dpKeywords" class="detail-keywords"></div>
        <table class="detail-table">
          <tr><td class="dt-label">FILE FORMAT</td><td id="dpFileFormat" class="dt-value">JPEG</td></tr>
          <tr><td class="dt-label">CATEGORY</td><td id="dpCategory" class="dt-value">-</td></tr>
          <tr><td class="dt-label">RESOLUTION</td><td class="dt-value">High Quality / Fully Scalable</td></tr>
          <tr><td class="dt-label">LICENSE</td><td class="dt-value">Free for Personal & Commercial Use</td></tr>
          <tr><td class="dt-label">FILE SIZE</td><td id="dpFileSize" class="dt-value">-</td></tr>
        </table>
        <button id="dpDownloadBtn" class="download-btn">DOWNLOAD</button>
      </div>
    </div>
  </div>

  <div id="infoModal" class="info-modal" style="display:none;">
    <div class="info-modal-box">
      <button class="info-modal-close" id="infoModalClose">&#10005;</button>
      <div id="infoModalBody" class="info-modal-body"></div>
    </div>
  </div>

  <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner"></div></div>

  <script src="main.js?v=2026031411"></script>
</body>
</html>
