<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vector, SVG & EPS Downloads</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- GÜNCEL VE KESİN ÇÖZÜM CSS --- */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Sayfa kaydırmasını kapatıyoruz */
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Üst Logo Bandı Yüksekliği */
        .top-banner {
            height: 60px;
            background-color: #000;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            z-index: 1001;
        }

        /* Header (Arama Çubuğu Kısmı) */
        .header {
            flex-shrink: 0;
            z-index: 1000;
        }

        /* ANA TAŞIYICI - Flex ile boyu tam doldurur ve kaydırılabilir yapar */
        .main-container {
            display: flex;
            flex: 1 1 auto; /* Orta alanın boşluğu doldurmasını sağlar */
            align-items: stretch; /* İçindeki sidebar ve content'i boydan boya uzatır */
            position: relative;
            overflow: hidden; /* Bu alanda kaydırma istemiyoruz */
        }

        /* SIDEBAR (Kategoriler) - Tam boy, Footer'a kadar uzanan kısım */
        .sidebar {
            width: 200px; /* Sabit genişlik */
            background-color: #fff;
            border-right: 1px solid #eee;
            padding: 15px 10px; /* İç boşluğu daralttık */
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto; /* Kategoriler çoksa kendi içinde kaydırılabilir */
            flex-shrink: 0;
        }

        .sidebar-title {
            font-weight: bold;
            font-size: 11px; /* Fontu biraz küçülttük */
            color: #666; /* Daha hafif bir renk */
            margin-bottom: 10px; /* Başlık ile liste arası boşluk */
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Kategoriler Listesi - Ara boşlukları daraltıldı */
        .categories-list a, .categories-list .category-item {
            display: block;
            padding: 2px 5px; /* Kategori öğelerinin dikey boşluğunu minimize ettik */
            font-size: 13px;
            color: #333;
            text-decoration: none;
            margin-bottom: 1px; /* Öğeler arası boşluk */
        }

        .categories-list a:hover {
            color: #000;
            background-color: #f9f9f9;
        }

        /* İçerik Alanı (Görseller) - Kaydırılabilir olan alan */
        .content {
            flex: 1;
            padding: 20px;
            background-color: #fff;
            overflow-y: auto; /* Görseller burada kaydırılır */
        }

        /* ALT SABİT ALAN - EKRANIN EN ALTINA SABİTLENDİ */
        .bottom-fixed-area {
            flex-shrink: 0;
            width: 100%;
            z-index: 1000;
            background-color: #fff;
            border-top: 1px solid #eee;
        }

        /* Sayfalama */
        .pagination-wrapper {
            padding: 10px 0;
            text-align: center;
        }

        .pagination-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .pag-btn {
            background-color: #1a1a1a;
            color: #fff;
            border: none;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
        }

        /* SİYAH FOOTER - Üst bantla (60px) tam eşit ve sabit */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background-color: #000;
            height: 60px; /* Üst bantla eşitlendi */
        }

        .copyright, .footer-link {
            color: #ccc;
            text-decoration: none;
            font-size: 12px;
        }

        .footer-nav {
            display: flex;
            gap: 20px;
        }

        .footer-link:hover { color: #fff; }

        /* Diğer teknik ayarlar */
        .dp-countdown-box { text-align: center; margin-top: 20px; }
        .dp-countdown-num { font-size: 48px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="top-banner">
        <a href="/" class="banner-logo-link">
            <img src="logo.svg" alt="Frevector" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-center">
            <div class="search-container">
                <button class="search-icon-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="8" r="6" stroke="#000" stroke-width="2"/><path d="M12.5 12.5L18 18" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search vectors...">
            </div>
        </div>
        <div class="header-right">
            <select id="sortFilter" class="sort-filter">
                <option value="">Upload date: Any time</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-title">CATEGORIES</div>
            <nav class="categories-list" id="categoriesList"></nav>
        </aside>

        <main class="content">
            <h1 id="categoryTitle" class="category-title">Vector</h1>
            <div id="vectorsGrid" class="vectors-grid"></div>
        </main>
    </div>

    <div class="bottom-fixed-area">
        <div class="pagination-wrapper">
            <div class="pagination-nav">
                <button id="prevBtn" class="pag-btn">&#8249; Previous</button>
                <span id="pageNumber" style="font-weight: bold; font-size: 14px;">1</span>
                <button id="nextBtn" class="pag-btn">Next &#8250;</button>
                <span id="pageTotal" style="color: #666;">/ 1</span>
            </div>
        </div>

        <footer class="footer">
            <span class="copyright">2026 &copy; frevector.com</span>
            <nav class="footer-nav">
                <a href="#" class="footer-link modal-trigger" data-modal="about">About Us</a>
                <a href="#" class="footer-link modal-trigger" data-modal="privacy">Privacy Policy</a>
                <a href="#" class="footer-link modal-trigger" data-modal="terms">Terms of Service</a>
                <a href="#" class="footer-link modal-trigger" data-modal="contact">Contact</a>
            </nav>
        </footer>
    </div>

    <div id="downloadPage" class="download-page" style="display:none;">
        <div class="download-page-header">
            <span class="dp-site">frevector.com</span>
            <button id="dpClose" class="dp-close">&#10005;</button>
        </div>
        <div class="download-page-body">
            <div class="dp-left"><img id="dpImage" src="" alt="" class="dp-image"></div>
            <div class="dp-right">
                <h2 id="dpTitle" class="dp-title"></h2>
                <p id="dpDescription" class="dp-desc"></p>
                <div id="dpKeywords" class="detail-keywords"></div>
                <table class="detail-table">
                    <tr><td class="dt-label">FILE FORMAT</td><td id="dpFileFormat" class="dt-value">JPEG</td></tr>
                    <tr><td class="dt-label">CATEGORY</td><td id="dpCategory" class="dt-value">-</td></tr>
                    <tr><td class="dt-label">RESOLUTION</td><td class="dt-value">High Quality / Fully Scalable</td></tr>
                    <tr><td class="dt-label">LICENSE</td><td class="dt-value">Free for Personal &amp; Commercial Use</td></tr>
                    <tr><td class="dt-label">FILE SIZE</td><td id="dpFileSize" class="dt-value">-</td></tr>
                </table>
                <button id="dpDownloadBtn" class="download-btn">DOWNLOAD</button>
                <div class="dp-countdown-box" id="dpCountdownBox" style="display:none;">
                    <p>Your download will start in</p>
                    <div id="dpCountdown" class="dp-countdown-num">4</div>
                </div>
            </div>
        </div>
    </div>

    <div id="infoModal" class="info-modal" style="display:none;">
        <div class="info-modal-box">
            <button class="info-modal-close" id="infoModalClose">&#10005;</button>
            <div id="infoModalBody" class="info-modal-body"></div>
        </div>
    </div>

    <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner"></div></div>
    <script src="main.js?v=2026031407"></script>
</body>
</html>
