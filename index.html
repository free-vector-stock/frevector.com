<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vector, SVG & EPS Downloads</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* TÜM BOŞLUKLARI VE HİZALAMALARI ZORLAYARAK ÇÖZEN CSS */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            width: 100% !important;
            overflow-x: hidden !important;
        }

        /* Ana konteynerin sağdaki boşluğu bırakmamasını sağlıyoruz */
        .main-container {
            padding-bottom: 130px !important;
            display: flex !important;
            width: 100% !important;
            height: calc(100vh - 120px) !important;
            align-items: stretch !important;
            box-sizing: border-box !important;
        }

        /* SIDEBAR GENİŞLİĞİ SABİT */
        .sidebar {
            width: 250px !important;
            display: flex !important;
            flex-direction: column !important;
            border-right: 1px solid #eee !important;
            background-color: #fff !important;
            padding: 20px 0 0 0 !important;
            flex-shrink: 0 !important;
        }

        .sidebar-title {
            padding: 0 20px 10px 20px !important;
            font-weight: bold !important;
            font-size: 14px !important;
        }

        .categories-list {
            flex: 1 !important;
            overflow-y: auto !important;
            padding: 0 10px 20px 20px !important;
        }

        /* BOŞLUĞU YOK EDEN CONTENT VE GRID - ZORLAYICI AYARLAR */
        .content {
            flex: 1 !important; 
            padding: 20px !important;
            overflow-y: auto !important;
            width: auto !important;
            min-width: 0 !important; /* Esnemeyi sağlar */
            box-sizing: border-box !important;
        }

        .vectors-grid {
            display: grid !important;
            /* 'auto-fit' sağdaki boşluğu görsellere dağıtır */
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)) !important;
            gap: 20px !important;
            width: 100% !important;
            justify-content: stretch !important;
        }

        /* ALT SABİT ALAN */
        .fixed-bottom-bar {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            z-index: 999 !important;
            background-color: #fff !important;
        }

        .pagination-wrapper {
            padding: 8px 0 !important;
            border-top: 1px solid #eee !important;
            text-align: center !important;
        }

        .pagination-nav {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            gap: 10px !important;
        }

        /* FOOTER - TAM ORTALI, ÜST ÜSTE VE SİYAH */
        .footer {
            display: flex !important;
            flex-direction: column !important; /* Telif üstte, linkler altta */
            justify-content: center !important;
            align-items: center !important;
            padding: 15px 0 !important;
            background-color: #000 !important;
            height: 90px !important;
            gap: 10px !important;
            width: 100% !important;
        }

        .copyright {
            color: #888 !important;
            font-size: 11px !important;
            text-align: center !important;
            display: block !important;
        }

        .footer-nav {
            display: flex !important;
            gap: 25px !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .footer-link {
            color: #888 !important;
            text-decoration: none !important;
            font-size: 14px !important;
            font-weight: 500 !important;
        }

        .footer-link:hover { color: #fff !important; }

        .top-banner {
            height: 60px;
            background-color: #000;
            display: flex;
            align-items: center;
        }

        /* MODAL YAPISI (BOZULMADI) */
        .info-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="top-banner">
        <a href="/" class="banner-logo-link">
            <img src="logo.svg" alt="Frevector" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-center">
            <div class="search-container">
                <button class="search-icon-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="8" r="6" stroke="#000" stroke-width="2"/><path d="M12.5 12.5L18 18" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search vectors...">
            </div>
        </div>
        <div class="header-right">
            <select id="sortFilter" class="sort-filter">
                <option value="">Upload date: Any time</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-title">CATEGORIES</div>
            <nav class="categories-list" id="categoriesList"></nav>
        </aside>

        <main class="content">
            <h1 id="categoryTitle" class="category-title">Vector</h1>
            <div id="vectorsGrid" class="vectors-grid"></div>
        </main>
    </div>

    <div class="fixed-bottom-bar">
        <div class="pagination-wrapper">
            <div class="pagination-nav">
                <button id="prevBtn" class="pag-btn">&#8249; Previous</button>
                <span id="pageNumber" style="font-size: 13px; font-weight: bold; color: #333;">1</span>
                <button id="nextBtn" class="pag-btn">Next &#8250;</button>
                <span id="pageTotal" style="font-size: 13px; color: #666;">/ 1</span>
            </div>
        </div>

        <footer class="footer">
            <span class="copyright">2026 &copy; frevector.com</span>
            <nav class="footer-nav">
                <a href="#" class="footer-link modal-trigger" data-modal="about">About Us</a>
                <a href="#" class="footer-link modal-trigger" data-modal="privacy">Privacy Policy</a>
                <a href="#" class="footer-link modal-trigger" data-modal="terms">Terms of Service</a>
                <a href="#" class="footer-link modal-trigger" data-modal="contact">Contact</a>
            </nav>
        </footer>
    </div>

    <div id="downloadPage" class="download-page" style="display:none;">
        <div class="download-page-header">
            <span class="dp-site">frevector.com</span>
            <button id="dpClose" class="dp-close">&#10005;</button>
        </div>
        <div class="download-page-body">
            <div class="dp-left"><img id="dpImage" src="" alt="" class="dp-image"></div>
            <div class="dp-right">
                <h2 id="dpTitle" class="dp-title"></h2>
                <p id="dpDescription" class="dp-desc"></p>
                <button id="dpDownloadBtn" class="download-btn">DOWNLOAD</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="info-modal" style="display:none;">
        <div class="info-modal-box">
            <button class="info-modal-close" id="infoModalClose">&#10005;</button>
            <div id="infoModalBody" class="info-modal-body"></div>
        </div>
    </div>

    <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner"></div></div>
    <script src="main.js?v=2026031407"></script>
</body>
</html>
