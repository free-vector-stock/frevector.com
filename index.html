<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector - Free Vector, SVG & EPS Downloads</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- TÜM TASARIM AYARLARI --- */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Sayfa genelinde kaydırmayı kapatıyoruz */
            font-family: sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Üst Logo Bandı */
        .top-banner {
            height: 60px;
            background-color: #000;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            z-index: 1001;
        }

        .banner-logo { height: 30px; padding-left: 20px; }

        /* Header (Arama Çubuğu) */
        .header {
            flex-shrink: 0;
            z-index: 1000;
            border-bottom: 1px solid #eee;
            background: #fff;
        }

        /* ANA TAŞIYICI */
        .main-container {
            display: flex;
            flex: 1 1 auto;
            align-items: stretch;
            position: relative;
            overflow: hidden;
        }

        /* SIDEBAR (Kategoriler) - Scroll ve Dar Boşluklar */
        .sidebar {
            width: 200px;
            background-color: #fff;
            border-right: 1px solid #eee;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
            /* Kaydırma Çubuğu Ayarları */
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #ccc transparent;
        }

        /* Chrome/Safari İnce Scrollbar */
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 10px; }

        .sidebar-title {
            font-weight: bold;
            font-size: 11px;
            color: #888;
            margin: 0 10px 10px 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Kategori Linkleri ve Aktif Durumu */
        .categories-list a {
            display: block;
            padding: 4px 12px;
            font-size: 13px;
            color: #333;
            text-decoration: none;
            margin-bottom: 1px;
            transition: all 0.2s;
        }

        .categories-list a:hover { background-color: #f5f5f5; }

        /* SEÇİLEN KATEGORİ: Siyah Arka Plan + Beyaz Yazı */
        .categories-list a.active {
            background-color: #000 !important;
            color: #fff !important;
            font-weight: bold;
            border-radius: 4px;
        }

        /* İÇERİK ALANI */
        .content {
            flex: 1;
            padding: 20px;
            background-color: #fff;
            overflow-y: auto; /* Görseller burada kayar */
        }

        /* ALT SABİT ALAN */
        .bottom-fixed-area {
            flex-shrink: 0;
            width: 100%;
            z-index: 1000;
            background-color: #fff;
            border-top: 1px solid #eee;
        }

        .pagination-wrapper { padding: 10px 0; text-align: center; }
        
        /* FOOTER - Büyük Font Ayarı */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background-color: #000;
            height: 60px;
        }

        .copyright {
            color: #ccc;
            font-size: 14px; /* Büyütüldü */
        }

        .footer-nav { display: flex; gap: 20px; }
        
        .footer-link {
            color: #ccc;
            text-decoration: none;
            font-size: 14px; /* Büyütüldü */
        }

        .footer-link:hover { color: #fff; }

        /* Detay Sayfası & Diğerleri */
        .detail-keywords { display: flex; flex-wrap: wrap; gap: 5px; margin: 15px 0; }
        .keyword-tag { background: #f0f0f0; padding: 4px 8px; border-radius: 3px; font-size: 11px; color: #666; }
    </style>
</head>
<body>
    <div class="top-banner">
        <a href="/" class="banner-logo-link">
            <img src="logo.svg" alt="Frevector" class="banner-logo">
        </a>
    </div>

    <header class="header">
        <div class="header-center">
            <div class="search-container">
                <button class="search-icon-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="8" r="6" stroke="#000" stroke-width="2"/><path d="M12.5 12.5L18 18" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Search vectors...">
            </div>
        </div>
        <div class="header-right">
            <select id="sortFilter" class="sort-filter">
                <option value="">Upload date: Any time</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-title">CATEGORIES</div>
            <nav class="categories-list" id="categoriesList">
                </nav>
        </aside>

        <main class="content">
            <h1 id="categoryTitle" class="category-title">Vector</h1>
            <div id="vectorsGrid" class="vectors-grid"></div>
        </main>
    </div>

    <div class="bottom-fixed-area">
        <div class="pagination-wrapper">
            <div class="pagination-nav">
                <button id="prevBtn" class="pag-btn">&#8249; Previous</button>
                <span id="pageNumber" style="font-weight: bold; font-size: 14px;">1</span>
                <button id="nextBtn" class="pag-btn">Next &#8250;</button>
                <span id="pageTotal" style="color: #666; font-size: 14px;">/ 1</span>
            </div>
        </div>

        <footer class="footer">
            <span class="copyright">2026 &copy; frevector.com</span>
            <nav class="footer-nav">
                <a href="#" class="footer-link modal-trigger" data-modal="about">About Us</a>
                <a href="#" class="footer-link modal-trigger" data-modal="privacy">Privacy Policy</a>
                <a href="#" class="footer-link modal-trigger" data-modal="terms">Terms of Service</a>
                <a href="#" class="footer-link modal-trigger" data-modal="contact">Contact</a>
            </nav>
        </footer>
    </div>

    <div id="downloadPage" class="download-page" style="display:none;">
        <div class="download-page-header">
            <span class="dp-site">frevector.com</span>
            <button id="dpClose" class="dp-close">&#10005;</button>
        </div>
        <div class="download-page-body">
            <div class="dp-left"><img id="dpImage" src="" alt="" class="dp-image"></div>
            <div class="dp-right">
                <h2 id="dpTitle" class="dp-title"></h2>
                <div id="dpKeywords" class="detail-keywords"></div>
                <button id="dpDownloadBtn" class="download-btn">DOWNLOAD</button>
            </div>
        </div>
    </div>

    <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner"></div></div>
    
    <script src="main.js?v=20260321"></script>
</body>
</html>
