name: R2 Delete JPEG Files

on:
  schedule:
    - cron: '0 5 * * *'  # Run every day at 5:00 AM (after batch update at 4:00 AM)
  workflow_dispatch:      # Allow manual trigger

jobs:
  delete-r2-jpeg:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required for git push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Delete R2 JPEG Files
        run: npm run delete-r2-jpeg-files
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Commit and Push Deletion Report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pinterest/r2-deletion-state.json 2>/dev/null || true
          git add pinterest/r2-deletion-report.json 2>/dev/null || true
          git commit -m "chore: update R2 JPEG deletion progress [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
