<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frevector Admin Panel</title>
    <style>
        :root {
            --black: #000;
            --white: #fff;
            --gray: #f5f5f5;
            --border: #e0e0e0;
            --red: #e53e3e;
            --blue: #3182ce;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: #f8f8f8; color: #1a1a1a; }

        /* LOGIN */
        #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--black); }
        .login-box { background: var(--white); padding: 48px 40px; border-radius: 8px; width: 380px; text-align: center; }
        .login-box input { width: 100%; padding: 11px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 14px; }
        .login-box button { width: 100%; padding: 11px; background: var(--black); color: var(--white); border: none; border-radius: 4px; font-weight: 600; cursor: pointer; }

        /* LAYOUT */
        #adminApp { display: none; }
        .admin-wrap { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 220px; background: var(--black); color: var(--white); position: fixed; height: 100vh; overflow-y: auto; padding: 20px 0; }
        .admin-main { margin-left: 220px; flex: 1; padding: 20px; }

        /* SIDEBAR NAV */
        .nav-btn { display: block; width: 100%; padding: 10px 20px; background: none; border: none; color: #aaa; text-align: left; cursor: pointer; font-size: 13px; }
        .nav-btn:hover, .nav-btn.active { color: #fff; background: #111; }
        .nav-btn.active { border-left: 3px solid #fff; }
        
        .cat-nav-btn { display: block; width: 100%; padding: 6px 20px 6px 35px; background: none; border: none; color: #888; text-align: left; cursor: pointer; font-size: 12px; }
        .cat-nav-btn:hover { color: #fff; }
        .cat-nav-btn.active { color: #fff; font-weight: 600; }

        /* GRID SYSTEM (4 COLUMNS) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .grid-column { display: flex; flex-direction: column; gap: 0; border: 1px solid #ddd; }
        
        .item-row {
            display: grid;
            grid-template-columns: 30px 50px 1fr 50px 40px 60px;
            align-items: center;
            padding: 5px;
            background: #fff;
            border-bottom: 1px solid #eee;
            font-size: 10px;
        }
        .item-row:hover { background: #f9f9f9; }
        .item-row img { width: 40px; height: 30px; object-fit: cover; }
        .item-row .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px; }
        
        .header-row {
            background: #000;
            color: #fff;
            display: grid;
            grid-template-columns: 30px 50px 1fr 50px 40px 60px;
            padding: 5px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* UTILS */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .stats-bar { background: #fff; padding: 10px 20px; border: 1px solid #eee; border-radius: 4px; display: flex; gap: 20px; font-size: 12px; margin-bottom: 15px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 15px; }
        .toolbar input, .toolbar select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
        .btn-red { background: var(--red); color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-blue { background: var(--blue); color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <h2>Frevector Admin</h2>
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="loginBtn">Login</button>
            <p id="loginError" style="color:red; display:none; margin-top:10px;">Invalid Password</p>
        </div>
    </div>

    <div id="adminApp">
        <div class="admin-wrap">
            <div class="admin-sidebar">
                <div style="padding: 0 20px 20px; border-bottom: 1px solid #333; margin-bottom: 10px;">
                    <h2 style="font-size: 16px;">Frevector</h2>
                    <p style="font-size: 10px; color: #666;">Content Management</p>
                </div>
                <button class="nav-btn active" onclick="switchSection('dashboard')">Dashboard</button>
                <button class="nav-btn" onclick="switchSection('upload')">Upload Vector</button>
                <button class="nav-btn" onclick="switchSection('manage')">Manage Vectors</button>
                <div id="sidebarCategories"></div>
                <button class="nav-btn" onclick="switchSection('manage-jpeg')">Manage JPEG</button>
                <button class="nav-btn" onclick="switchSection('health')">System Health</button>
                <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
                    <button id="logoutBtn" style="width:100%; padding:8px; background:#222; color:#fff; border:1px solid #444; cursor:pointer;">Logout</button>
                </div>
            </div>

            <div class="admin-main">
                <div class="admin-header">
                    <h1 id="sectionTitle">Dashboard</h1>
                    <img src="/logo.svg" height="30" alt="logo">
                </div>

                <!-- SECTIONS -->
                <div id="dashboard" class="admin-section active">
                    <div class="stats-bar">
                        <div>TOTAL CONTENT: <span id="totalVectors">0</span></div>
                        <div>TOTAL DOWNLOADS: <span id="totalDownloads">0</span></div>
                    </div>
                    <table style="width:100%; background:#fff; border:1px solid #eee; border-collapse:collapse;">
                        <thead><tr style="background:#000; color:#fff; text-align:left;"><th style="padding:10px;">Category</th><th style="padding:10px;">Vectors</th><th style="padding:10px;">JPEG</th><th style="padding:10px;">Downloads</th></tr></thead>
                        <tbody id="catTableBody"></tbody>
                    </table>
                </div>

                <div id="manage" class="admin-section">
                    <div class="stats-bar">
                        <div>Total Downloads: <span id="totalDlAllTime">0</span></div>
                        <div>Last 24h: <span id="totalDl24h">0</span></div>
                    </div>
                    <div class="toolbar">
                        <input type="text" id="searchManage" placeholder="Search..." style="flex:1;">
                        <select id="filterCategory"><option value="">All Categories</option></select>
                        <button class="btn-red" id="bulkDeleteBtn">Delete Selected (0)</button>
                    </div>
                    <div id="gridContainer" class="grid-container"></div>
                </div>
                
                <div id="upload" class="admin-section">
                    <div style="background:#fff; padding:30px; border:1px solid #eee;">
                        <h3>Upload Vectors</h3>
                        <input type="file" id="bulkFileInput" multiple style="margin-top:20px;">
                        <button class="btn-blue" id="bulkUploadBtn" style="margin-top:20px;">Start Upload</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
